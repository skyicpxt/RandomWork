<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Meme Generator</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-blob bg-blob-center" aria-hidden="true"></div>
  <div class="container">
    <h1>Meme Generator</h1>
    
    <div id="authContainer" class="auth-container">
      <!-- Email Step -->
      <div id="emailStep" class="auth-step">
        <h2>Let's log you in</h2>
        <p class="auth-description">
          Enter your email, and we'll send you a verification code. We'll create
          an account for you too if you don't already have one.
        </p>
        <form id="emailForm" class="auth-form">
          <div class="control-group">
            <label for="emailInput">Email</label>
            <input 
              type="email" 
              id="emailInput" 
              placeholder="Enter your email" 
              required 
              autofocus
            >
          </div>
          <button type="submit" class="btn btn-primary">Send Code</button>
        </form>
      </div>

      <!-- Code Step -->
      <div id="codeStep" class="auth-step" style="display: none;">
        <h2>Enter your code</h2>
        <p class="auth-description">
          We sent an email to <strong id="sentEmailDisplay"></strong>. 
          Check your email, and paste the code you see.
        </p>
        <form id="codeForm" class="auth-form">
          <div class="control-group">
            <label for="codeInput">Verification Code</label>
            <input 
              type="text" 
              id="codeInput" 
              placeholder="123456..." 
              required 
              autofocus
            >
          </div>
          <button type="submit" class="btn btn-primary">Verify Code</button>
          <button type="button" id="backToEmailBtn" class="btn btn-secondary">Back</button>
        </form>
      </div>

      <!-- Error Display -->
      <div id="authError" class="auth-error" style="display: none;"></div>
    </div>
  </div>

  <!-- Load InstantDB from CDN -->
  <script type="module">
    import { init, i, id } from 'https://cdn.jsdelivr.net/npm/@instantdb/core@0.19.20/+esm';
    
    // Make InstantDB available globally
    window.InstantDBLib = { init, i, id };
    
    // Load our API wrapper
    const script = document.createElement('script');
    script.src = 'api.js';
    script.onload = () => {
      // Initialize InstantDB library in our API
      if (window.InstantDB && window.InstantDB.setInstantDBLib) {
        window.InstantDB.setInstantDBLib(window.InstantDBLib);
      }
      // Load auth.js
      const authScript = document.createElement('script');
      authScript.src = 'auth.js';
      document.body.appendChild(authScript);
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
