<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meme Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-blob bg-blob-center" aria-hidden="true"></div>
  <div class="container">
    <h1>Meme Generator</h1>

    <div class="controls">
      <div class="control-group">
        <label for="imageInput" class="btn btn-primary">Choose image</label>
        <input type="file" id="imageInput" accept="image/*" hidden>
      </div>

      <div class="control-group">
        <button type="button" id="addTextBtn" class="btn btn-secondary" disabled>Add text box</button>
      </div>

      <div class="control-group">
        <button type="button" id="downloadBtn" class="btn btn-download" disabled>Download meme</button>
      </div>
    </div>

    <div id="textBoxEditor" class="text-box-editor" style="display: none;">
      <h3>Edit Text Box</h3>
      <div class="controls">
        <div class="control-group">
          <label for="textBoxText">Text</label>
          <input type="text" id="textBoxText" placeholder="Enter text">
        </div>
        <div class="control-group">
          <label for="textBoxFontSize">Font size: <span id="textBoxFontSizeValue">48</span>px</label>
          <input type="range" id="textBoxFontSize" min="16" max="120" value="48">
        </div>
        <div class="control-group">
          <label for="textBoxColor">Text color</label>
          <input type="color" id="textBoxColor" value="#ffffff" title="Text color">
        </div>
        <div class="control-group">
          <button type="button" id="deleteTextBtn" class="btn btn-delete">Delete</button>
        </div>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="memeCanvas"></canvas>
      <p class="hint" id="hint">Choose an image, then click anywhere on it to add text boxes.</p>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
